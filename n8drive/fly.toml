# fly.toml — launch-ready: aligned with Next standalone port

app = "publiclogic-puddlejumper"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  NEXTJS_URL = "http://localhost:3003"

[http_service]
  # 🔥 MUST match the port the Express gateway listens on
  internal_port = 3002
  force_https = true

  # Prevent Fly from autostopping during cold starts
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    type = "http"
    interval = "15s"
    timeout = "3s"
    grace_period = "60s"
    method = "get"
    path = "/v1/health"

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "pj_data"
  destination = "/app/data"
