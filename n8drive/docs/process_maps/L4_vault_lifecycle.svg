<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 380" role="img">
<title>L4 — VAULT lifecycle · v2</title>
<desc>VAULT framework five-phase sequence: Verification, Authority, Utility, Legitimacy, Transfer. Verification requires auth. Authority requires admin role. Transfer produces sealed evidence. See _glossary.md.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text { font-family: system-ui, -apple-system, sans-serif; }
.title { font-size: 18px; font-weight: 500; fill: #2C2C2A; }
.subtitle { font-size: 12px; fill: #5F5E5A; }
.banner { font-size: 11px; fill: #5F5E5A; font-weight: 500; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.arr-w { stroke: #444441; stroke-width: 2; fill: none; stroke-linecap: round; }
.teal > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.teal .th { fill: #085041; }
.teal .ts { fill: #0F6E56; }
.badge > rect { fill: #FFFFFF; stroke: #888780; stroke-width: 0.5; }
.badge text { font-size: 11px; fill: #444441; font-weight: 500; }
@media (prefers-color-scheme: dark) {
  .title { fill: #F1EFE8; }
  .subtitle { fill: #B4B2A9; }
  .banner { fill: #B4B2A9; }
  .th { fill: #F1EFE8; } .ts { fill: #B4B2A9; }
  .arr-w { stroke: #D3D1C7; }
  .teal > rect { fill: #085041; stroke: #5DCAA5; }
  .teal .th { fill: #E1F5EE; } .teal .ts { fill: #9FE1CB; }
  .badge > rect { fill: #2C2C2A; stroke: #B4B2A9; }
  .badge text { fill: #D3D1C7; }
}
</style>
</defs>

<text class="title" x="40" y="30">L4 — VAULT lifecycle</text>
<text class="subtitle" x="40" y="50">Verification → Authority → Utility → Legitimacy → Transfer</text>
<text class="banner" x="640" y="30" text-anchor="end">v2 · 2026-05-05</text>

<g class="teal">
<rect x="40" y="110" width="180" height="70" rx="8"/>
<text class="th" x="130" y="134" text-anchor="middle" dominant-baseline="central">V — Verification</text>
<text class="ts" x="130" y="156" text-anchor="middle" dominant-baseline="central">Authenticate input</text>
</g>
<g class="badge"><rect x="105" y="184" width="50" height="14" rx="7"/>
<text x="130" y="193" text-anchor="middle" dominant-baseline="central">auth</text></g>

<g class="teal">
<rect x="250" y="110" width="180" height="70" rx="8"/>
<text class="th" x="340" y="134" text-anchor="middle" dominant-baseline="central">A — Authority</text>
<text class="ts" x="340" y="156" text-anchor="middle" dominant-baseline="central">Authorize action</text>
</g>
<g class="badge"><rect x="315" y="184" width="50" height="14" rx="7"/>
<text x="340" y="193" text-anchor="middle" dominant-baseline="central">admin</text></g>

<g class="teal">
<rect x="460" y="110" width="180" height="70" rx="8"/>
<text class="th" x="550" y="134" text-anchor="middle" dominant-baseline="central">U — Utility</text>
<text class="ts" x="550" y="156" text-anchor="middle" dominant-baseline="central">Compute result</text>
</g>

<g class="teal">
<rect x="145" y="210" width="180" height="70" rx="8"/>
<text class="th" x="235" y="234" text-anchor="middle" dominant-baseline="central">L — Legitimacy</text>
<text class="ts" x="235" y="256" text-anchor="middle" dominant-baseline="central">Statutory check</text>
</g>

<g class="teal">
<rect x="355" y="210" width="180" height="70" rx="8"/>
<text class="th" x="445" y="234" text-anchor="middle" dominant-baseline="central">T — Transfer</text>
<text class="ts" x="445" y="256" text-anchor="middle" dominant-baseline="central">Deliver evidence</text>
</g>
<g class="badge"><rect x="417" y="284" width="56" height="14" rx="7"/>
<text x="445" y="293" text-anchor="middle" dominant-baseline="central">sealed</text></g>

<line x1="220" y1="145" x2="250" y2="145" class="arr-w" marker-end="url(#arrow)"/>
<line x1="430" y1="145" x2="460" y2="145" class="arr-w" marker-end="url(#arrow)"/>
<path d="M550,180 V200 H235 V210" class="arr-w" marker-end="url(#arrow)"/>
<line x1="325" y1="245" x2="355" y2="245" class="arr-w" marker-end="url(#arrow)"/>
<g transform="translate(380, 330)">
<rect x="0" y="0" width="260" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
<text class="banner" x="8" y="14">Legend</text>
<line x1="8" y1="26" x2="38" y2="26" class="arr-w"/>
<text class="banner" x="44" y="29">phase</text>
<g class="badge"><rect x="100" y="20" width="50" height="14" rx="7"/><text x="125" y="29" text-anchor="middle" dominant-baseline="central">badge</text></g>
<text class="banner" x="158" y="29">authority / state</text>
</g>
</svg>
