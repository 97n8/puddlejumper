<text class="ts" x="340" y="332" text-anchor="middle" dominant-baseline="central">Receive code · exchange</text>
</g>
<line x1="340" y1="352" x2="340" y2="368" class="arr-w" marker-end="url(#arrow)"/>

<g class="purple">
<rect x="240" y="368" width="200" height="56" rx="8"/>
<text class="th" x="340" y="386" text-anchor="middle" dominant-baseline="central">Operational stores</text>
<text class="ts" x="340" y="404" text-anchor="middle" dominant-baseline="central">Token row · encrypted at rest</text>
</g>
<line x1="340" y1="424" x2="340" y2="440" class="arr-w" marker-end="url(#arrow)"/>

<g class="teal">
<rect x="240" y="440" width="200" height="56" rx="8"/>
<text class="th" x="340" y="458" text-anchor="middle" dominant-baseline="central">Connectors</text>
<text class="ts" x="340" y="476" text-anchor="middle" dominant-baseline="central">Use token</text>
</g>
<line x1="340" y1="496" x2="340" y2="512" class="arr-w" marker-end="url(#arrow)"/>

<g class="gray">
<rect x="240" y="512" width="200" height="56" rx="8"/>
<text class="th" x="340" y="530" text-anchor="middle" dominant-baseline="central">Provider API call</text>
<text class="ts" x="340" y="548" text-anchor="middle" dominant-baseline="central">Authenticated request</text>
</g>
<g class="badge"><rect x="450" y="533" width="36" height="14" rx="7"/>
<text x="468" y="542" text-anchor="middle" dominant-baseline="central">ext</text></g>
<g transform="translate(380, 590)">
<rect x="0" y="0" width="260" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
