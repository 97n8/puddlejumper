<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 340" role="img">
<title>L4 — PRR lifecycle · v2</title>
<desc>Public Records Request statutory state machine per MGL c.66. Seven states: received, logged, assigned, searching, reviewing, responded, closed. logged is append-only, assigned requires admin role, closed seals the record under retention. See _glossary.md.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text { font-family: system-ui, -apple-system, sans-serif; }
.title { font-size: 18px; font-weight: 500; fill: #2C2C2A; }
.subtitle { font-size: 12px; fill: #5F5E5A; }
.banner { font-size: 11px; fill: #5F5E5A; font-weight: 500; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.arr-w { stroke: #444441; stroke-width: 2; fill: none; stroke-linecap: round; }
.teal > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.teal .th { fill: #085041; }
.badge > rect { fill: #FFFFFF; stroke: #888780; stroke-width: 0.5; }
.badge text { font-size: 11px; fill: #444441; font-weight: 500; }
@media (prefers-color-scheme: dark) {
  .title { fill: #F1EFE8; }
  .subtitle { fill: #B4B2A9; }
  .banner { fill: #B4B2A9; }
  .th { fill: #F1EFE8; }
  .arr-w { stroke: #D3D1C7; }
  .teal > rect { fill: #085041; stroke: #5DCAA5; }
  .teal .th { fill: #E1F5EE; }
  .badge > rect { fill: #2C2C2A; stroke: #B4B2A9; }
  .badge text { fill: #D3D1C7; }
}
</style>
</defs>

<text class="title" x="40" y="30">L4 — PRR lifecycle</text>
<text class="subtitle" x="40" y="50">Statutory state machine · MGL c.66</text>
<text class="banner" x="640" y="30" text-anchor="end">v2 · 2026-05-05</text>

<g class="teal"><rect x="40" y="110" width="130" height="44" rx="8"/>
<text class="th" x="105" y="132" text-anchor="middle" dominant-baseline="central">received</text></g>
<g class="teal"><rect x="196" y="110" width="130" height="44" rx="8"/>
<text class="th" x="261" y="132" text-anchor="middle" dominant-baseline="central">logged</text></g>
<g class="teal"><rect x="352" y="110" width="130" height="44" rx="8"/>
<text class="th" x="417" y="132" text-anchor="middle" dominant-baseline="central">assigned</text></g>
<g class="teal"><rect x="508" y="110" width="130" height="44" rx="8"/>
<text class="th" x="573" y="132" text-anchor="middle" dominant-baseline="central">searching</text></g>

<g class="teal"><rect x="40" y="200" width="130" height="44" rx="8"/>
<text class="th" x="105" y="222" text-anchor="middle" dominant-baseline="central">reviewing</text></g>
<g class="teal"><rect x="196" y="200" width="130" height="44" rx="8"/>
<text class="th" x="261" y="222" text-anchor="middle" dominant-baseline="central">responded</text></g>
<g class="teal"><rect x="352" y="200" width="130" height="44" rx="8"/>
<text class="th" x="417" y="222" text-anchor="middle" dominant-baseline="central">closed</text></g>

<line x1="170" y1="132" x2="196" y2="132" class="arr-w" marker-end="url(#arrow)"/>
<line x1="326" y1="132" x2="352" y2="132" class="arr-w" marker-end="url(#arrow)"/>
<line x1="482" y1="132" x2="508" y2="132" class="arr-w" marker-end="url(#arrow)"/>

<path d="M573,154 V180 H105 V200" class="arr-w" marker-end="url(#arrow)"/>

<line x1="170" y1="222" x2="196" y2="222" class="arr-w" marker-end="url(#arrow)"/>
<line x1="326" y1="222" x2="352" y2="222" class="arr-w" marker-end="url(#arrow)"/>

<g class="badge"><rect x="233" y="160" width="56" height="14" rx="7"/>
<text x="261" y="169" text-anchor="middle" dominant-baseline="central">append</text></g>
<g class="badge"><rect x="392" y="160" width="50" height="14" rx="7"/>
<text x="417" y="169" text-anchor="middle" dominant-baseline="central">admin</text></g>
<g class="badge"><rect x="389" y="250" width="56" height="14" rx="7"/>
<text x="417" y="259" text-anchor="middle" dominant-baseline="central">sealed</text></g>
<g transform="translate(380, 290)">
<rect x="0" y="0" width="260" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
<text class="banner" x="8" y="14">Legend</text>
<line x1="8" y1="26" x2="38" y2="26" class="arr-w"/>
<text class="banner" x="44" y="29">transition</text>
<g class="badge"><rect x="120" y="20" width="50" height="14" rx="7"/><text x="145" y="29" text-anchor="middle" dominant-baseline="central">badge</text></g>
<text class="banner" x="178" y="29">authority / state</text>
</g>
</svg>
