<line x1="8" y1="26" x2="38" y2="26" class="arr-w"/>
<text class="banner" x="44" y="29">step</text>
<g class="badge"><rect x="92" y="20" width="36" height="14" rx="7"/><text x="110" y="29" text-anchor="middle" dominant-baseline="central">ext</text></g>
<g class="badge"><rect x="138" y="20" width="50" height="14" rx="7"/><text x="163" y="29" text-anchor="middle" dominant-baseline="central">async</text></g>
