<text class="ts" x="340" y="276" text-anchor="middle" dominant-baseline="central">.github/workflows</text>
</g>
<g class="badge"><rect x="445" y="261" width="50" height="14" rx="7"/>
<text x="470" y="270" text-anchor="middle" dominant-baseline="central">async</text></g>

<line x1="340" y1="296" x2="180" y2="340" class="arr-w" marker-end="url(#arrow)"/>
<line x1="340" y1="296" x2="500" y2="340" class="arr-w" marker-end="url(#arrow)"/>

