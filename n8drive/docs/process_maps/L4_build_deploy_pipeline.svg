<rect x="80" y="344" width="200" height="56" rx="8"/>
<text class="th" x="180" y="362" text-anchor="middle" dominant-baseline="central">Vercel build</text>
<text class="ts" x="180" y="380" text-anchor="middle" dominant-baseline="central">build · deploy</text>
</g>
<g class="badge"><rect x="225" y="406" width="36" height="14" rx="7"/>
<text x="243" y="415" text-anchor="middle" dominant-baseline="central">ext</text></g>

<g class="teal">
<rect x="400" y="344" width="200" height="56" rx="8"/>
<text class="th" x="500" y="362" text-anchor="middle" dominant-baseline="central">Fly.io build</text>
<text class="ts" x="500" y="380" text-anchor="middle" dominant-baseline="central">build · deploy</text>
</g>
<g class="badge"><rect x="545" y="406" width="36" height="14" rx="7"/>
<text x="563" y="415" text-anchor="middle" dominant-baseline="central">ext</text></g>

<line x1="180" y1="424" x2="180" y2="448" class="arr-w" marker-end="url(#arrow)"/>
<line x1="500" y1="424" x2="500" y2="448" class="arr-w" marker-end="url(#arrow)"/>

<g class="coral">
<rect x="80" y="448" width="200" height="44" rx="8"/>
<text class="th" x="180" y="470" text-anchor="middle" dominant-baseline="central">LogicOS UI</text>
</g>

<g class="teal">
<rect x="400" y="448" width="200" height="44" rx="8"/>
<text class="th" x="500" y="470" text-anchor="middle" dominant-baseline="central">api.publiclogic.org</text>
</g>
<g transform="translate(380, 500)">
<rect x="0" y="0" width="260" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
