<text class="th" x="460" y="458" text-anchor="middle" dominant-baseline="central">Feature modules</text>
<text class="ts" x="460" y="476" text-anchor="middle" dominant-baseline="central">AED · Civic · PRR</text>
</g>

<line x1="220" y1="496" x2="300" y2="528" class="arr-w" marker-end="url(#arrow)"/>
<line x1="460" y1="496" x2="380" y2="528" class="arr-w" marker-end="url(#arrow)"/>

<g class="purple">
<rect x="140" y="530" width="400" height="56" rx="8"/>
<text class="th" x="340" y="548" text-anchor="middle" dominant-baseline="central">Operational stores</text>
<text class="ts" x="340" y="566" text-anchor="middle" dominant-baseline="central">Durable state · evidence</text>
</g>

<path d="M340,586 V602 H200 V618" class="arr-w" marker-end="url(#arrow)"/>
<path d="M340,586 V602 H480 V618" class="arr-cw" marker-end="url(#arrow)"/>

<g class="purple">
<rect x="80" y="620" width="240" height="32" rx="8"/>
<text class="th" x="200" y="636" text-anchor="middle" dominant-baseline="central">audit_events</text>
</g>
<g class="badge">
