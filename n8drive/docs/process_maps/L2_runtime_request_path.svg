<line x1="340" y1="316" x2="520" y2="346" class="arr-w" marker-end="url(#arrow)"/>

<path d="M340,316 V335 H250 V438" class="arr-w" marker-end="url(#arrow)"/>
<path d="M340,316 V335 H430 V438" class="arr-w" marker-end="url(#arrow)"/>

<g class="teal">
<rect x="80" y="350" width="160" height="56" rx="8"/>
<text class="th" x="160" y="368" text-anchor="middle" dominant-baseline="central">Auth · session</text>
<text class="ts" x="160" y="386" text-anchor="middle" dominant-baseline="central">Identity</text>
</g>
<g class="badge">
<rect x="135" y="412" width="50" height="14" rx="7"/>
<text x="160" y="421" text-anchor="middle" dominant-baseline="central">auth</text>
</g>

<g class="teal">
<rect x="260" y="350" width="160" height="56" rx="8"/>
<text class="th" x="340" y="368" text-anchor="middle" dominant-baseline="central">Routes</text>
<text class="ts" x="340" y="386" text-anchor="middle" dominant-baseline="central">Module dispatch</text>
</g>

