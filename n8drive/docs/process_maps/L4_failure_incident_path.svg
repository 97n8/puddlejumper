<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 580" role="img">
<title>L4 — Failure / incident path · v2</title>
<desc>How a failure flows through the system. An execution-surface exception is caught at the PJ API boundary, which always writes an audit event and returns an error response to LogicOS. Conditionally (per severity / wired alerting) it pages an operator and may escalate into a Governance engine incident review. See _glossary.md.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text { font-family: system-ui, -apple-system, sans-serif; }
.title { font-size: 18px; font-weight: 500; fill: #2C2C2A; }
.subtitle { font-size: 12px; fill: #5F5E5A; }
.banner { font-size: 11px; fill: #5F5E5A; font-weight: 500; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.arr-w  { stroke: #444441; stroke-width: 2; fill: none; stroke-linecap: round; }
.arr-cw { stroke: #444441; stroke-width: 2; fill: none; stroke-linecap: round; stroke-dasharray: 5 4; }
.gray   > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
.gray   .th { fill: #2C2C2A; } .gray .ts { fill: #5F5E5A; }
.coral  > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
.coral  .th { fill: #712B13; } .coral .ts { fill: #993C1D; }
.teal   > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.teal   .th { fill: #085041; } .teal .ts { fill: #0F6E56; }
.purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.purple .th { fill: #3C3489; } .purple .ts { fill: #534AB7; }
.badge > rect { fill: #FFFFFF; stroke: #888780; stroke-width: 0.5; }
.badge text { font-size: 11px; fill: #444441; font-weight: 500; }
@media (prefers-color-scheme: dark) {
  .title { fill: #F1EFE8; }
  .subtitle, .banner { fill: #B4B2A9; }
  .th { fill: #F1EFE8; } .ts { fill: #B4B2A9; }
  .arr-w, .arr-cw { stroke: #D3D1C7; }
  .gray   > rect { fill: #2C2C2A; stroke: #B4B2A9; }
  .gray   .th { fill: #F1EFE8; } .gray .ts { fill: #D3D1C7; }
  .coral  > rect { fill: #712B13; stroke: #F0997B; }
  .coral  .th { fill: #FAECE7; } .coral .ts { fill: #F5C4B3; }
  .teal   > rect { fill: #085041; stroke: #5DCAA5; }
  .teal   .th { fill: #E1F5EE; } .teal .ts { fill: #9FE1CB; }
  .purple > rect { fill: #3C3489; stroke: #AFA9EC; }
  .purple .th { fill: #EEEDFE; } .purple .ts { fill: #CECBF6; }
  .badge > rect { fill: #2C2C2A; stroke: #B4B2A9; }
  .badge text { fill: #D3D1C7; }
}
</style>
</defs>

<text class="title" x="40" y="30">L4 — Failure / incident path</text>
<text class="subtitle" x="40" y="50">How a failure propagates · what gets logged, surfaced, escalated</text>
<text class="subtitle" x="40" y="68">Conditional alerting; not every failure pages an operator.</text>
<text class="banner" x="640" y="30" text-anchor="end">v2 · 2026-05-05</text>

<g class="gray">
<rect x="240" y="90" width="200" height="56" rx="8"/>
<text class="th" x="340" y="108" text-anchor="middle" dominant-baseline="central">Failure event</text>
<text class="ts" x="340" y="126" text-anchor="middle" dominant-baseline="central">Exec surface · store · ext</text>
</g>
<line x1="340" y1="146" x2="340" y2="170" class="arr-w" marker-end="url(#arrow)"/>

<g class="teal">
<rect x="240" y="170" width="200" height="56" rx="8"/>
<text class="th" x="340" y="188" text-anchor="middle" dominant-baseline="central">PJ API exception</text>
<text class="ts" x="340" y="206" text-anchor="middle" dominant-baseline="central">Boundary handler</text>
</g>

<line x1="340" y1="226" x2="120" y2="280" class="arr-w" marker-end="url(#arrow)"/>
<line x1="340" y1="226" x2="340" y2="280" class="arr-w" marker-end="url(#arrow)"/>
<line x1="340" y1="226" x2="560" y2="280" class="arr-cw" marker-end="url(#arrow)"/>

<g class="coral">
<rect x="40" y="284" width="180" height="56" rx="8"/>
<text class="th" x="130" y="302" text-anchor="middle" dominant-baseline="central">LogicOS</text>
<text class="ts" x="130" y="320" text-anchor="middle" dominant-baseline="central">Error response</text>
</g>

<g class="purple">
<rect x="250" y="284" width="180" height="56" rx="8"/>
<text class="th" x="340" y="302" text-anchor="middle" dominant-baseline="central">audit_events</text>
<text class="ts" x="340" y="320" text-anchor="middle" dominant-baseline="central">Failure record</text>
</g>
<g class="badge"><rect x="312" y="346" width="56" height="14" rx="7"/>
<text x="340" y="355" text-anchor="middle" dominant-baseline="central">append</text></g>

<g class="gray">
<rect x="460" y="284" width="180" height="56" rx="8"/>
<text class="th" x="550" y="302" text-anchor="middle" dominant-baseline="central">Operator alert</text>
<text class="ts" x="550" y="320" text-anchor="middle" dominant-baseline="central">Pager · email</text>
</g>
<g class="badge"><rect x="497" y="346" width="36" height="14" rx="7"/>
<text x="515" y="355" text-anchor="middle" dominant-baseline="central">ext</text></g>
<g class="badge"><rect x="540" y="346" width="50" height="14" rx="7"/>
<text x="565" y="355" text-anchor="middle" dominant-baseline="central">async</text></g>

<line x1="550" y1="365" x2="550" y2="400" class="arr-cw" marker-end="url(#arrow)"/>

<g class="teal">
<rect x="460" y="404" width="180" height="56" rx="8"/>
<text class="th" x="550" y="422" text-anchor="middle" dominant-baseline="central">Governance engine</text>
<text class="ts" x="550" y="440" text-anchor="middle" dominant-baseline="central">Incident review</text>
</g>
<g class="badge"><rect x="525" y="466" width="50" height="14" rx="7"/>
<text x="550" y="475" text-anchor="middle" dominant-baseline="central">admin</text></g>

<g transform="translate(40, 504)">
<rect x="0" y="0" width="260" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
<text class="banner" x="8" y="14">Legend</text>
<line x1="8" y1="26" x2="38" y2="26" class="arr-w"/>
<text class="banner" x="44" y="29">always</text>
<line x1="92" y1="26" x2="122" y2="26" class="arr-cw"/>
<text class="banner" x="128" y="29">conditional</text>
<g class="badge"><rect x="200" y="20" width="50" height="14" rx="7"/><text x="225" y="29" text-anchor="middle" dominant-baseline="central">badge</text></g>
</g>
</svg>
