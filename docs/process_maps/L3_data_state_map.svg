<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 400" role="img">
<title>L3 — Data / state map · v2</title>
<desc>Where writes happen. Auth · session writes to sessions zone, Governance engine writes to approvals, Feature modules write to feature state. Operational stores trigger audit_events on every write (SQLite triggers). audit_events flows to ARCHIEVE / SEAL where the path is wired. See _glossary.md for token definitions.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text { font-family: system-ui, -apple-system, sans-serif; }
.title { font-size: 18px; font-weight: 500; fill: #2C2C2A; }
.subtitle { font-size: 12px; fill: #5F5E5A; }
.banner { font-size: 11px; fill: #5F5E5A; font-weight: 500; }
.t  { font-size: 14px; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.lbl { font-size: 11px; font-weight: 500; fill: #5F5E5A; letter-spacing: 0.04em; }
.zone { font-size: 12px; fill: #3C3489; }
.arr-w  { stroke: #444441; stroke-width: 2; fill: none; stroke-linecap: round; }
.arr-cw { stroke: #444441; stroke-width: 2; fill: none; stroke-linecap: round; stroke-dasharray: 5 4; }
.teal   > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
.teal   .th { fill: #085041; } .teal .ts { fill: #0F6E56; }
.purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.purple .th { fill: #3C3489; } .purple .ts { fill: #534AB7; }
.zonebox > rect { fill: none; stroke: #534AB7; stroke-width: 0.5; }
.zonebox .zone { fill: #3C3489; }
.badge > rect { fill: #FFFFFF; stroke: #888780; stroke-width: 0.5; }
.badge text { font-size: 11px; fill: #444441; font-weight: 500; }
@media (prefers-color-scheme: dark) {
  .title { fill: #F1EFE8; }
  .subtitle, .lbl { fill: #B4B2A9; }
  .banner { fill: #B4B2A9; }
  .t  { fill: #E5E4DC; }
  .ts { fill: #B4B2A9; }
  .th { fill: #F1EFE8; }
  .arr-w, .arr-cw { stroke: #D3D1C7; }
  .teal   > rect { fill: #085041; stroke: #5DCAA5; }
  .teal   .th { fill: #E1F5EE; } .teal .ts { fill: #9FE1CB; }
  .purple > rect { fill: #3C3489; stroke: #AFA9EC; }
  .purple .th { fill: #EEEDFE; } .purple .ts { fill: #CECBF6; }
  .zonebox > rect { stroke: #AFA9EC; }
  .zonebox .zone { fill: #CECBF6; }
  .badge > rect { fill: #2C2C2A; stroke: #B4B2A9; }
  .badge text { fill: #D3D1C7; }
}
</style>
</defs>

<text class="title" x="40" y="30">L3 — Data / state map</text>
<text class="subtitle" x="40" y="50">What writes to where · ops triggers audit</text>
<text class="subtitle" x="40" y="68">Material writes audit by trigger; transient/cache writes do not.</text>
<text class="banner" x="640" y="30" text-anchor="end">v2 · 2026-05-05</text>

<text class="lbl" x="120" y="88" text-anchor="middle">Writers</text>
<text class="lbl" x="340" y="88" text-anchor="middle">Stores</text>
<text class="lbl" x="560" y="88" text-anchor="middle">Evidence</text>

<g class="teal">
<rect x="40" y="130" width="160" height="40" rx="8"/>
<text class="th" x="120" y="152" text-anchor="middle" dominant-baseline="central">Auth · session</text>
</g>
<g class="teal">
<rect x="40" y="180" width="160" height="40" rx="8"/>
<text class="th" x="120" y="202" text-anchor="middle" dominant-baseline="central">Governance engine</text>
</g>
<g class="teal">
<rect x="40" y="230" width="160" height="40" rx="8"/>
<text class="th" x="120" y="252" text-anchor="middle" dominant-baseline="central">Feature modules</text>
</g>

<g class="purple">
<rect x="240" y="120" width="200" height="160" rx="8"/>
<text class="th" x="340" y="142" text-anchor="middle" dominant-baseline="central">Operational stores</text>
<text class="ts" x="340" y="160" text-anchor="middle" dominant-baseline="central">SQLite · WAL · per-org</text>
</g>
<g class="zonebox">
<rect x="270" y="178" width="140" height="24" rx="4"/>
<text class="zone" x="340" y="192" text-anchor="middle" dominant-baseline="central">sessions</text>
</g>
<g class="zonebox">
<rect x="270" y="208" width="140" height="24" rx="4"/>
<text class="zone" x="340" y="222" text-anchor="middle" dominant-baseline="central">approvals</text>
</g>
<g class="zonebox">
<rect x="270" y="238" width="140" height="24" rx="4"/>
<text class="zone" x="340" y="252" text-anchor="middle" dominant-baseline="central">feature state</text>
</g>

<line x1="200" y1="150" x2="270" y2="190" class="arr-w" marker-end="url(#arrow)"/>
<line x1="200" y1="200" x2="270" y2="220" class="arr-w" marker-end="url(#arrow)"/>
<line x1="200" y1="250" x2="270" y2="250" class="arr-w" marker-end="url(#arrow)"/>

<g class="purple">
<rect x="480" y="140" width="160" height="44" rx="8"/>
<text class="th" x="560" y="162" text-anchor="middle" dominant-baseline="central">audit_events</text>
</g>
<g class="badge">
<rect x="535" y="190" width="50" height="14" rx="7"/>
<text x="560" y="199" text-anchor="middle" dominant-baseline="central">append</text>
</g>

<g class="purple">
<rect x="480" y="220" width="160" height="44" rx="8"/>
<text class="th" x="560" y="242" text-anchor="middle" dominant-baseline="central">ARCHIEVE / SEAL</text>
</g>
<g class="badge">
<rect x="535" y="270" width="50" height="14" rx="7"/>
<text x="560" y="279" text-anchor="middle" dominant-baseline="central">sealed</text>
</g>

<line x1="440" y1="162" x2="480" y2="162" class="arr-w" marker-end="url(#arrow)"/>
<line x1="560" y1="184" x2="560" y2="220" class="arr-cw" marker-end="url(#arrow)"/>
<g transform="translate(380, 350)">
<rect x="0" y="0" width="260" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
<text class="banner" x="8" y="14">Legend</text>
<line x1="8" y1="26" x2="38" y2="26" class="arr-w"/>
<text class="banner" x="44" y="29">write</text>
<line x1="92" y1="26" x2="122" y2="26" class="arr-cw"/>
<text class="banner" x="128" y="29">conditional</text>
<g class="badge"><rect x="200" y="20" width="50" height="14" rx="7"/><text x="225" y="29" text-anchor="middle" dominant-baseline="central">badge</text></g>
</g>
</svg>
