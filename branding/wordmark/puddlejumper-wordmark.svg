<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 130" role="img" aria-label="PuddleJumper">
  <!-- PuddleJumper wordmark — color. Production: outline text to paths.
       Font: heavy italic rounded sans (Baloo 2 / Nunito fallback). -->
  <style>
    .wm { font-family: "Baloo 2","Nunito","Segoe UI",system-ui,sans-serif;
          font-weight: 800; font-style: italic; font-size: 92px; letter-spacing: -2px; }
  </style>
  <text class="wm" x="300" y="96" text-anchor="middle">
    <tspan fill="#315d74">Puddle</tspan><tspan fill="#2f5d50">Jumper</tspan>
  </text>
</svg>
