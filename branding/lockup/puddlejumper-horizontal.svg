<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 120" role="img" aria-label="PuddleJumper by PublicLogic">
  <!-- Horizontal lockup — mark + wordmark/tagline. Clear space = mark height / 2. -->
  <defs>
    <linearGradient id="pjlh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f5d50"/>
      <stop offset="1" stop-color="#315d74"/>
    </linearGradient>
  </defs>
  <style>
    .wm  { font-family:"Baloo 2","Nunito","Segoe UI",system-ui,sans-serif; font-weight:800; font-style:italic; font-size:58px; letter-spacing:-1.2px; }
    .tag { font-family:"Baloo 2","Nunito","Segoe UI",system-ui,sans-serif; font-weight:700; font-style:italic; font-size:22px; letter-spacing:-.4px; }
  </style>
  <!-- mark -->
  <g transform="translate(12,12)">
    <rect width="96" height="96" rx="26" fill="url(#pjlh)"/>
    <path d="M16 67 Q48 59 80 67" stroke="rgba(255,255,255,.32)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="58" cy="38" r="13" fill="#fbfaf6"/>
    <circle cx="61.5" cy="36" r="2.8" fill="#17211d"/>
    <path d="M70 40 l11 3 -11 4 z" fill="#b88a3b"/>
    <path d="M30 55 Q32 37 50 39 q11 1.3 13 11 -6.5 6.5 -19.5 6.5 -11 0 -13 -2 z" fill="#fbfaf6"/>
  </g>
  <!-- wordmark + tagline -->
  <text class="wm" x="132" y="58">
    <tspan fill="#315d74">Puddle</tspan><tspan fill="#2f5d50">Jumper</tspan>
  </text>
  <text class="tag" x="134" y="92">
    <tspan fill="#6e7b86">by </tspan><tspan fill="#315d74">Public</tspan><tspan fill="#2f5d50">Logic</tspan>
  </text>
</svg>
