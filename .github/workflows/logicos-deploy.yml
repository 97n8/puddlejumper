name: LogicOS Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/logicos/**"
      - ".github/workflows/logicos-deploy.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  workflow_dispatch:

concurrency:
  group: logicos-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy LogicOS to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://os.publiclogic.org

    steps:
      - name: Validate secrets
        run: |
          missing=()
          [ -z "$VERCEL_TOKEN" ] && missing+=("VERCEL_TOKEN")
          [ -z "$VERCEL_ORG_ID" ] && missing+=("VERCEL_ORG_ID")
          [ -z "$VERCEL_PROJECT_ID" ] && missing+=("VERCEL_PROJECT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing or empty repository secrets: ${missing[*]}"
            exit 1
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Enable corepack/pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm --version

      - name: Setup Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run LogicOS tests
        run: pnpm --filter @gpr/logicos run test

      - name: Run LogicOS lint
        run: pnpm --filter @gpr/logicos run lint

      - name: Build LogicOS
        run: pnpm --filter @gpr/logicos run build

      - name: Pull Vercel project settings
        run: pnpm dlx vercel@latest pull --yes --environment=production --cwd apps/logicos --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Vercel output
        run: pnpm dlx vercel@latest build --prod --cwd apps/logicos --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --cwd apps/logicos --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
